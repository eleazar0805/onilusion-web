# Avisos y PRs automáticos cuando haya actualizaciones de seguridad
# en las dependencias (Next.js, next-intl, nodemailer, etc.).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencias
    # Solo parches y versiones menores: los saltos de versión mayor
    # (Next 15/16, React 19, zod 4…) rompen el build y deben migrarse
    # a mano de forma planificada, no automáticamente.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      producción:
        dependency-type: production
      desarrollo:
        dependency-type: development
